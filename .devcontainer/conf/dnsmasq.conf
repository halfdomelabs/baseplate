# =============================================================================
# dnsmasq — DNS allowlist resolver
#
# Only resolves domains listed in allowed-domains.txt (via generated
# forwarding rules in /etc/dnsmasq.d/allowed-domains.conf).
# All other queries return NXDOMAIN to prevent DNS exfiltration.
# =============================================================================

# Only listen on localhost
listen-address=127.0.0.1
bind-interfaces

# Run as dedicated dnsmasq user (used by iptables --uid-owner to restrict DNS upstream access)
user=dnsmasq

# Don't read /etc/resolv.conf (upstream set explicitly in forwarding rules)
no-resolv

# Log queries for debugging
log-queries
log-facility=/var/log/dnsmasq.log

# Include generated per-domain forwarding rules
conf-dir=/etc/dnsmasq.d

# Default: return NXDOMAIN for all domains not explicitly forwarded
address=/#/
