packages:
  - packages/*
  - plugins/*

blockExoticSubdeps: true

catalog:
  '@eslint/js': 9.39.2
  '@module-federation/enhanced': 2.3.3
  '@module-federation/vite': 1.15.4
  '@tailwindcss/vite': 4.3.0
  '@types/node': ^24.12.0
  '@types/react': 19.1.3
  '@types/react-dom': 19.1.3
  '@vitejs/plugin-react': 6.0.2
  cpx2: 8.0.0
  eslint: 9.39.2
  nodemon: 3.1.11
  oxlint: 1.56.0
  prettier: 3.8.1
  react: 19.1.0
  react-dom: 19.1.0
  tailwindcss: 4.3.0
  tsx: 4.22.3
  typescript: 5.9.3
  vite: 8.0.14
  vite-plugin-svgr: 4.5.0
  vitest: 4.1.7
  zod: ^4.3.6

ignoredBuiltDependencies:
  - '@prisma/engines'
  - '@tailwindcss/oxide'
  - cpu-features
  - esbuild
  - protobufjs
  - ssh2
  - unrs-resolver

linkWorkspacePackages: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - vite

publishBranch: main

saveWorkspaceProtocol: rolling

publicHoistPattern:
  - prettier-plugin-packagejson
  - prettier-plugin-tailwindcss

dedupePeers: true

allowBuilds:
  '@prisma/engines': false
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false
  unrs-resolver: false
