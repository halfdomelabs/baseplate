packages:
  - packages/*
  - plugins/*

blockExoticSubdeps: true

catalog:
  '@eslint/js': 9.39.2
  '@module-federation/enhanced': 2.7.0
  '@module-federation/vite': 1.16.11
  '@tailwindcss/vite': 4.3.1
  '@types/node': ^24.12.0
  '@types/react': 19.1.3
  '@types/react-dom': 19.1.3
  '@vitejs/plugin-react': 6.0.3
  cpx2: 8.0.0
  eslint: 9.39.2
  nodemon: 3.1.11
  oxlint: 1.67.0
  prettier: 3.8.1
  react: 19.1.0
  react-dom: 19.1.0
  tailwindcss: 4.3.1
  tsx: 4.22.3
  typescript: 6.0.3
  'typescript-eslint': 8.65.0
  vite: 8.1.0
  vite-plugin-svgr: 5.2.0
  vitest: 4.1.7
  zod: ^4.3.6

ignoredBuiltDependencies:
  - '@prisma/engines'
  - '@tailwindcss/oxide'
  - cpu-features
  - esbuild
  - protobufjs
  - ssh2
  - unrs-resolver

linkWorkspacePackages: true

minimumReleaseAge: 1440

publishBranch: main

saveWorkspaceProtocol: rolling

publicHoistPattern:
  - prettier-plugin-packagejson
  - prettier-plugin-tailwindcss

dedupePeers: true

allowBuilds:
  '@prisma/engines': false
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false
  unrs-resolver: false

minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - js-yaml@3.15.0
  - adm-zip@0.6.0
  - brace-expansion@2.1.2
  - brace-expansion@1.1.16
  - brace-expansion@5.0.7
  - js-yaml@4.3.0
  - shell-quote@1.8.5
  - protobufjs@7.6.5
  - body-parser@2.3.0
